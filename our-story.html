<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的故事</title>
<style>
/* ============================================================
   RESET & VARIABLES
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #faf5f2;
  --surface:  #fffcf9;
  --rose:     #c97b7b;
  --rose-deep:#a85555;
  --rose-light:#f5e8e8;
  --gold:     #c9a96e;
  --gold-light:#f7f1e3;
  --text:     #3d2c2c;
  --muted:    #8c7b7b;
  --border:   #ead5d5;
  --radius:   20px;
  --radius-sm:12px;
  --radius-xs:8px;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  --shadow-card: 0 2px 20px rgba(139,90,90,0.06);
  --shadow-card-hover: 0 8px 40px rgba(139,90,90,0.12);
  --shadow-modal: 0 20px 60px rgba(61,44,44,0.2);
}

html { scroll-behavior: smooth; background: var(--bg); }
body {
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   FLOATING PETALS
   ============================================================ */
.petals-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  overflow: hidden;
}
.petal {
  position: absolute;
  top: -60px;
  animation: petal-fall linear infinite;
  opacity: 0;
  pointer-events: none;
}
@keyframes petal-fall {
  0%   { transform: translateY(0) rotate(0deg) scale(0.3); opacity: 0; }
  5%   { opacity: 0.8; }
  50%  { opacity: 0.7; }
  80%  { opacity: 0.4; }
  100% { transform: translateY(105vh) rotate(720deg) scale(1); opacity: 0; }
}

/* ============================================================
   SCROLL-DRIVEN DECORATIVE LINE (top bar)
   ============================================================ */
.scroll-indicator {
  position: fixed; top: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--rose), var(--gold));
  z-index: 1000; transform-origin: left;
  border-radius: 0 2px 2px 0;
}

/* ============================================================
   NAVIGATION (subtle top bar)
   ============================================================ */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1rem clamp(1rem,4vw,3rem);
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(250,245,242,0.75);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.4s ease, background 0.4s ease;
}
.top-nav.scrolled {
  border-bottom-color: var(--border);
  background: rgba(250,245,242,0.92);
}
.top-nav .brand {
  font-size: 1rem; font-weight: 600;
  color: var(--rose-deep);
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 8px;
}
.top-nav .brand .heart-icon { font-size: 1.2rem; animation: heartbeat 1.2s ease-in-out infinite; }
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  15%  { transform: scale(1.25); }
  30%  { transform: scale(1); }
  45%  { transform: scale(1.2); }
  60%  { transform: scale(1); }
}
.top-nav .nav-actions { display: flex; gap: 1.2rem; align-items: center; }
.top-nav .nav-btn {
  background: none; border: none;
  color: var(--muted); font-size: 1.1rem;
  cursor: pointer; padding: 6px; border-radius: 50%;
  transition: color 0.25s ease, background 0.25s ease, transform 0.25s ease;
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
}
.top-nav .nav-btn:hover {
  color: var(--rose-deep);
  background: var(--rose-light);
  transform: scale(1.1);
}

/* ============================================================
   HERO
   ============================================================ */
.hero {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  padding: 6rem 1.5rem 4rem;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, rgba(201,121,121,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 25% 65%, rgba(201,169,110,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 75% 50%, rgba(201,121,121,0.06) 0%, transparent 50%);
  pointer-events: none;
}
.hero-content {
  text-align: center; position: relative; z-index: 2;
  max-width: 700px;
}
.hero-ornament {
  font-size: 3.5rem; margin-bottom: 1.5rem;
  animation: float-ornament 3s ease-in-out infinite;
  display: block;
}
@keyframes float-ornament {
  0%,100% { transform: translateY(0); }
  50%  { transform: translateY(-12px); }
}
.hero h1 {
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Serif SC",serif;
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 300; letter-spacing: 0.06em;
  color: var(--text);
  margin-bottom: 0.8rem;
}
.hero .subtitle {
  font-size: 1.05rem; color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 2rem;
}
.hero .days-counter {
  display: inline-flex; align-items: baseline; gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 14px 32px;
  box-shadow: 0 4px 24px rgba(139,90,90,0.06);
  margin-bottom: 2.5rem;
}
.days-counter .days-number {
  font-size: 2.6rem; font-weight: 200;
  color: var(--rose);
  line-height: 1;
  font-family: "SF Pro Display","PingFang SC",sans-serif;
}
.days-counter .days-label {
  font-size: 0.9rem; color: var(--muted);
  letter-spacing: 0.04em;
}
.hero .partner-names {
  font-size: 1.3rem; color: var(--text);
  font-weight: 400;
  letter-spacing: 0.06em;
}
.hero .partner-names .ampersand {
  color: var(--rose);
  font-family: "Georgia","Noto Serif SC",serif;
  font-style: italic;
  margin: 0 0.5rem;
}
.scroll-hint {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  color: var(--muted); font-size: 0.72rem; letter-spacing: 0.12em;
  animation: fade-in-up 1s 1.5s both;
  z-index: 2;
}
.scroll-hint .arrow { animation: bounce-down 1.8s ease-in-out infinite; font-size: 1.1rem; }
@keyframes bounce-down {
  0%,100% { transform: translateY(0); opacity: 0.5; }
  50%  { transform: translateY(8px); opacity: 1; }
}
@keyframes fade-in-up {
  from { opacity: 0; transform: translateX(-50%) translateY(12px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ============================================================
   DAYS BADGE (sticky side indicator)
   ============================================================ */
.days-badge {
  position: fixed; right: clamp(1rem,4vw,2rem);
  top: 50%; transform: translateY(-50%);
  z-index: 50;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 16px 14px;
  text-align: center;
  box-shadow: var(--shadow-card);
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: opacity 0.5s ease, transform 0.5s var(--ease-out-expo);
}
.days-badge.hidden { opacity: 0; transform: translateY(-50%) translateX(20px); pointer-events: none; }
.days-badge .badge-num { font-size: 1.4rem; font-weight: 200; color: var(--rose); line-height: 1; }
.days-badge .badge-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.06em; writing-mode: vertical-lr; }

/* ============================================================
   SECTION STYLES
   ============================================================ */
section { padding: 5rem clamp(1rem,4vw,2rem); position: relative; z-index: 1; }
.section-inner { max-width: 900px; margin: 0 auto; }
.section-header {
  text-align: center; margin-bottom: 3.5rem;
}
.section-header .section-num {
  font-family: "SF Mono","Cascadia Code",monospace;
  font-size: 0.68rem; color: var(--rose);
  letter-spacing: 0.22em; display: block; margin-bottom: 0.6rem;
}
.section-header h2 {
  font-size: clamp(1.5rem, 3.5vw, 2rem);
  font-weight: 400; letter-spacing: 0.05em;
  color: var(--text);
}
.section-header .section-line {
  display: block; width: 40px; height: 1px;
  background: var(--gold); margin: 1rem auto 0;
}

/* ============================================================
   SECTION DIVIDER
   ============================================================ */
.section-divider {
  display: flex; align-items: center; justify-content: center;
  gap: 1rem; padding: 1rem 0;
  max-width: 900px; margin: 0 auto;
  position: relative; z-index: 1;
}
.section-divider .divider-line {
  flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
}
.section-divider .divider-icon { font-size: 1rem; color: var(--rose); opacity: 0.6; }

/* ============================================================
   FILTER CHIPS
   ============================================================ */
.filter-bar {
  display: flex; justify-content: center; gap: 0.6rem;
  flex-wrap: wrap; margin-bottom: 2.5rem;
}
.filter-chip {
  padding: 8px 18px; border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 0.82rem; cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.03em;
  font-family: inherit;
}
.filter-chip:hover {
  border-color: var(--rose);
  color: var(--rose);
}
.filter-chip.active {
  background: var(--rose);
  color: #fff;
  border-color: var(--rose);
}

/* ============================================================
   TIMELINE
   ============================================================ */
.timeline {
  position: relative;
  padding: 1rem 0;
}
.timeline::before {
  content: '';
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom,
    transparent 0%,
    var(--border) 5%,
    var(--border) 95%,
    transparent 100%
  );
  transform: translateX(-50%);
}
.timeline-item {
  position: relative;
  margin-bottom: 3rem;
  display: flex; align-items: flex-start;
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s var(--ease-out-expo);
}
.timeline-item.revealed { opacity: 1; transform: translateY(0); }
.timeline-item:nth-child(odd)  { flex-direction: row; padding-right: calc(50% + 2.5rem); }
.timeline-item:nth-child(even) { flex-direction: row-reverse; padding-left: calc(50% + 2.5rem); }

.timeline-dot {
  position: absolute; left: 50%; top: 1.5rem;
  transform: translate(-50%, -50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--rose);
  z-index: 2;
  transition: transform 0.3s var(--ease-out-back), box-shadow 0.3s ease;
}
.timeline-item:hover .timeline-dot {
  transform: translate(-50%, -50%) scale(1.4);
  box-shadow: 0 0 0 8px rgba(201,121,121,0.12);
}

.timeline-card {
  flex: 1; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.8rem;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.4s ease, transform 0.4s ease;
  position: relative;
  cursor: default;
}
.timeline-card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-3px);
}
.timeline-card .card-date {
  font-size: 0.75rem; color: var(--rose);
  letter-spacing: 0.1em; margin-bottom: 0.5rem;
  font-weight: 500;
}
.timeline-card .card-mood {
  position: absolute; top: 1.8rem; right: 1.8rem;
  font-size: 1.6rem;
}
.timeline-card .card-title {
  font-size: 1.05rem; font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text);
  padding-right: 2.5rem;
}
.timeline-card .card-content {
  font-size: 0.88rem; color: var(--muted);
  line-height: 1.8;
}
.timeline-card .card-image {
  width: 100%; aspect-ratio: 16/10;
  border-radius: var(--radius-sm);
  background: linear-gradient(145deg, var(--rose-light), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  margin-top: 1rem;
  overflow: hidden;
}
.timeline-card .card-image img {
  width: 100%; height: 100%; object-fit: cover;
}
.timeline-card .card-actions {
  display: flex; gap: 0.5rem; margin-top: 1rem;
  opacity: 0; transition: opacity 0.3s ease;
}
.timeline-card:hover .card-actions { opacity: 1; }
.card-actions button {
  background: none; border: 1px solid var(--border);
  padding: 4px 12px; border-radius: 100px;
  font-size: 0.72rem; color: var(--muted);
  cursor: pointer; transition: all 0.25s ease;
  font-family: inherit;
}
.card-actions button:hover {
  border-color: var(--rose);
  color: var(--rose);
  background: var(--rose-light);
}
.card-actions button.danger:hover {
  border-color: #d44;
  color: #d44;
  background: #fff0f0;
}
.timeline-card .milestone-badge {
  display: inline-block;
  background: var(--gold-light);
  color: var(--gold);
  font-size: 0.68rem; padding: 2px 10px;
  border-radius: 100px;
  letter-spacing: 0.06em;
  margin-bottom: 0.6rem;
}

/* ============================================================
   EMPTY STATE
   ============================================================ */
.empty-state {
  text-align: center; padding: 4rem 2rem;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
.empty-state p { font-size: 0.95rem; }

/* ============================================================
   GALLERY
   ============================================================ */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 1.2rem;
}
.gallery-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.4s ease, transform 0.4s ease;
  cursor: pointer;
  opacity: 0; transform: translateY(24px);
}
.gallery-card.revealed { opacity: 1; transform: translateY(0); }
.gallery-card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-4px);
}
.gallery-card .gallery-image {
  width: 100%; aspect-ratio: 1;
  background: linear-gradient(145deg, var(--rose-light), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 3.5rem;
  position: relative;
  overflow: hidden;
}
.gallery-card .gallery-image img {
  width: 100%; height: 100%; object-fit: cover;
}
.gallery-card .gallery-info {
  padding: 1.2rem;
}
.gallery-card .gallery-date {
  font-size: 0.72rem; color: var(--rose);
  letter-spacing: 0.06em;
}
.gallery-card .gallery-title {
  font-size: 0.9rem; font-weight: 600;
  margin-top: 0.3rem;
}

/* ============================================================
   FAB (add button)
   ============================================================ */
.fab {
  position: fixed; bottom: 2rem; right: clamp(1rem,5vw,2.5rem);
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--rose-deep));
  color: #fff; font-size: 1.6rem;
  border: none; cursor: pointer;
  box-shadow: 0 6px 24px rgba(168,85,85,0.35);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s var(--ease-out-back), box-shadow 0.3s ease;
  line-height: 1;
}
.fab:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 32px rgba(168,85,85,0.5);
}
.fab:active { transform: scale(0.95); }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(61,44,44,0.3);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-modal);
  width: 100%; max-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 2rem;
  position: relative;
  transform: translateY(20px);
  transition: transform 0.4s var(--ease-out-expo);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal .modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none;
  font-size: 1.3rem; cursor: pointer;
  color: var(--muted); padding: 4px 8px; border-radius: 8px;
  transition: color 0.25s ease, background 0.25s ease;
}
.modal .modal-close:hover { color: var(--text); background: var(--rose-light); }
.modal h3 { font-size: 1.3rem; font-weight: 500; margin-bottom: 1.5rem; text-align: center; letter-spacing: 0.04em; }

/* Form */
.form-group { margin-bottom: 1.2rem; }
.form-group label {
  display: block; font-size: 0.82rem; font-weight: 500;
  color: var(--text); margin-bottom: 0.4rem;
  letter-spacing: 0.03em;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  font-size: 0.9rem; font-family: inherit;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
  outline: none;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--rose);
  box-shadow: 0 0 0 3px rgba(201,121,121,0.1);
}
.form-group textarea { resize: vertical; min-height: 90px; }
.form-group .checkbox-row {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.form-group .checkbox-row input[type="checkbox"] {
  width: auto; accent-color: var(--rose);
}
.form-group .mood-picker {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.mood-picker .mood-option {
  font-size: 1.5rem; padding: 8px 10px;
  border: 2px solid transparent;
  border-radius: 50%; cursor: pointer;
  background: none;
  transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
}
.mood-picker .mood-option:hover { transform: scale(1.15); background: var(--rose-light); }
.mood-picker .mood-option.selected { border-color: var(--rose); background: var(--rose-light); }

/* Image upload */
.image-upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.3s ease, background 0.3s ease;
  background: var(--bg);
  position: relative;
  min-height: 120px;
  display: flex; align-items: center; justify-content: center;
}
.image-upload-area:hover { border-color: var(--rose); background: var(--rose-light); }
.image-upload-area.drag-over { border-color: var(--rose-deep); background: var(--rose-light); }
.upload-placeholder { color: var(--muted); }
.upload-placeholder .upload-icon { font-size: 2rem; display: block; margin-bottom: 0.4rem; }
.upload-placeholder span { display: block; font-size: 0.82rem; line-height: 1.6; }
.upload-placeholder .upload-hint { font-size: 0.72rem; color: var(--muted); opacity: 0.7; }
.upload-preview { position: relative; }
.upload-preview img { max-width: 100%; max-height: 200px; border-radius: var(--radius-xs); object-fit: cover; }
.clear-image-btn {
  position: absolute; top: -6px; right: -6px;
  background: var(--rose-deep); color: #fff;
  border: none; padding: 4px 10px; border-radius: 100px;
  font-size: 0.7rem; cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  font-family: inherit;
}
.clear-image-btn:hover { transform: scale(1.08); box-shadow: 0 2px 12px rgba(168,85,85,0.4); }
.image-url-row { display: flex; align-items: center; gap: 0.8rem; margin-top: 0.6rem; }
.or-divider { font-size: 0.74rem; color: var(--muted); white-space: nowrap; }

.form-actions {
  display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1.5rem;
}
.btn {
  padding: 10px 24px; border-radius: 100px;
  font-size: 0.88rem; font-weight: 500;
  cursor: pointer; border: none;
  letter-spacing: 0.03em;
  transition: all 0.3s ease;
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--rose), var(--rose-deep));
  color: #fff;
  box-shadow: 0 4px 16px rgba(168,85,85,0.25);
}
.btn-primary:hover {
  box-shadow: 0 6px 24px rgba(168,85,85,0.4);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--rose); color: var(--rose); }

/* ============================================================
   SETUP MODAL (welcome / first-time)
   ============================================================ */
.setup-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(61,44,44,0.45);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem;
}
.setup-overlay.hidden { display: none; }
.setup-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-modal);
  padding: 2.5rem 2rem;
  max-width: 440px; width: 100%;
  text-align: center;
}
.setup-card .setup-icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
.setup-card h2 {
  font-size: 1.5rem; font-weight: 400;
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}

}
.setup-card .form-group { text-align: left; }
.setup-card .setup-hint {

}

/* ============================================================
   DETAIL MODAL (view memory detail)
   ============================================================ */
.detail-image {
  width: 100%; aspect-ratio: 16/10;
  border-radius: var(--radius-sm);
  background: linear-gradient(145deg, var(--rose-light), var(--gold-light));
  display: flex; align-items: center; justify-content: center;

}
.detail-image img { width: 100%; height: 100%; object-fit: cover; }
.detail-meta {

}
.detail-meta .detail-mood { font-size: 2rem; }
.detail-meta .detail-date { font-size: 0.85rem; color: var(--rose); letter-spacing: 0.06em; }
.detail-content { font-size: 0.92rem; color: var(--muted); line-height: 1.9; }

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #fff;
  padding: 10px 24px; border-radius: 100px;
  font-size: 0.82rem; letter-spacing: 0.03em;
  z-index: 600; opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s var(--ease-out-expo);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================
   FOOTER
   ============================================================ */
footer {
  text-align: center; padding: 3rem 1.5rem;

footer .footer-quote {

}
footer .footer-heart { color: var(--rose); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .timeline::before { left: 1rem; }
  .timeline-item:nth-child(odd),
  .timeline-item:nth-child(even) {
    flex-direction: row;

@media (max-width: 480px) {

  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

<script>
(function(){
'use strict';

/* ==========================================================
   DATA LAYER
   ========================================================== */
const STORAGE_KEY = 'our-story-data';

const defaultData = {
  startDate: '',
  partner1: '',
  partner2: '',
  memories: []
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { ...defaultData, memories: [] };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function isFirstTime() {
  const data = loadData();
  return !data.startDate || !data.partner1 || !data.partner2;
}

let appData = loadData();
if (!appData.memories) appData.memories = [];

/* ==========================================================
   DOM REFS
   ============================================================ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

/* ==========================================================
   UTILS
   ============================================================ */
function daysBetween(d1, d2) {
  const ms = d2.getTime() - d1.getTime();
  return Math.max(0, Math.floor(ms / (1000 * 60 * 60 * 24)));
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const weekdays = ['日','一','二','三','四','五','六'];
  const w = weekdays[d.getDay()];
  return `${y}年${m}月${day}日 星期${w}`;
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const toast = $('#toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
}

/* ==========================================================
   PETALS
   ============================================================ */
function initPetals() {
  const layer = $('#petalsLayer');
  const petalShapes = ['🌸','💮','🌷','🪷','✿','❀','🌺','💐','🏵️'];
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 28; i++) {
    const petal = document.createElement('span');
    petal.classList.add('petal');
    petal.textContent = petalShapes[Math.floor(Math.random() * petalShapes.length)];
    petal.style.left = Math.random() * 100 + '%';
    petal.style.fontSize = (0.6 + Math.random() * 0.9) + 'rem';
    petal.style.animationDuration = (10 + Math.random() * 18) + 's';
    petal.style.animationDelay = Math.random() * 15 + 's';
    petal.style.opacity = (0.25 + Math.random() * 0.35);
    frag.appendChild(petal);
  }
  layer.appendChild(frag);
}

/* ==========================================================
   UPDATE UI: DAYS, NAMES
   ============================================================ */
function updateDaysCounter() {
  const daysNum = $('#daysNumber');
  const badgeNum = $('#badgeNum');
  const name1 = $('#namePartner1');
  const name2 = $('#namePartner2');

  name1.textContent = appData.partner1 || '我';
  name2.textContent = appData.partner2 || '你';

  if (appData.startDate) {
    const start = new Date(appData.startDate + 'T00:00:00');
    const today = new Date();
    today.setHours(0,0,0,0);
    const days = daysBetween(start, today);
    daysNum.textContent = days;
    badgeNum.textContent = days;
  } else {
    daysNum.textContent = '--';
    badgeNum.textContent = '0';
  }
}

/* ==========================================================
   SCROLL HANDLERS
   ============================================================ */
function initScroll() {
  const scrollIndicator = $('#scrollIndicator');
  const topNav = $('#topNav');
  const daysBadge = $('#daysBadge');

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const docH = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docH > 0 ? Math.min(scrollY / docH, 1) : 0;

    // Progress bar
    scrollIndicator.style.transform = 'scaleX(' + pct + ')';

    // Top nav background
    if (scrollY > 60) {
      topNav.classList.add('scrolled');
    } else {
      topNav.classList.remove('scrolled');
    }

    // Days badge visibility
    const heroH = $('#hero').offsetHeight;
    if (scrollY > heroH * 0.5) {
      daysBadge.classList.remove('hidden');
    } else {
      daysBadge.classList.add('hidden');
    }
  }, { passive: true });
}

/* ==========================================================
   INTERSECTION OBSERVER (reveal animations)
   ============================================================ */
function initRevealObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('revealed');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

  // Observe timeline items & gallery cards
  const observeAll = () => {
    $$('.timeline-item').forEach(el => observer.observe(el));
    $$('.gallery-card').forEach(el => observer.observe(el));
  };

  // MutationObserver to catch newly added elements
  const watchEls = [$('#timeline'), $('#gallery')];
  watchEls.forEach(watchEl => {
    if (!watchEl) return;
    const mo = new MutationObserver(() => observeAll());
    mo.observe(watchEl, { childList: true });
  });

  observeAll();
}

/* ==========================================================
   RENDER TIMELINE
   ============================================================ */
let currentTimelineFilter = 'all';

function renderTimeline(filter) {
  currentTimelineFilter = filter || currentTimelineFilter;
  const timeline = $('#timeline');
  const empty = $('#timelineEmpty');

  let memories = [...appData.memories].sort((a, b) => {
    return new Date(b.date) - new Date(a.date);
  });

  if (currentTimelineFilter !== 'all') {
    memories = memories.filter(m => {
      if (currentTimelineFilter === 'milestone') return m.isMilestone;
      return m.category === currentTimelineFilter;
    });
  }

  if (memories.length === 0) {
    timeline.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  timeline.innerHTML = memories.map(m => `
    <div class="timeline-item">
      <div class="timeline-dot"></div>
      <div class="timeline-card" data-id="${m.id}">
        ${m.isMilestone ? '<span class="milestone-badge">⭐ 里程碑</span>' : ''}
        <div class="card-date">${formatDate(m.date)}</div>
        <div class="card-mood">${m.mood || '💕'}</div>
        <div class="card-title">${escapeHtml(m.title)}</div>
        ${m.content ? `<div class="card-content">${escapeHtml(m.content)}</div>` : ''}
        ${(m.imageUrl || m.imageEmoji) ? `
          <div class="card-image">
            ${m.imageUrl ? `<img src="${escapeHtml(m.imageUrl)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span style=font-size:3rem>🖼️</span>'">` : `<span>${m.imageEmoji}</span>`}
          </div>` : ''}
        <div class="card-actions">
          <button class="edit-btn" data-id="${m.id}">✏️ 编辑</button>
          <button class="danger delete-btn" data-id="${m.id}">🗑 删除</button>
        </div>
      </div>
    </div>
  `).join('');

  // Bind card click → detail modal
  timeline.querySelectorAll('.timeline-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (e.target.closest('button')) return; // Don't trigger on button clicks
      const id = this.dataset.id;
      openDetailModal(id);
    });
  });

  // Bind edit/delete buttons
  timeline.querySelectorAll('.edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openEditModal(btn.dataset.id);
    });
  });
  timeline.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteMemory(btn.dataset.id);
    });
  });

  // Re-observe new elements
  $$('.timeline-item').forEach(el => {
    el.classList.remove('revealed');
  });
  setTimeout(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('revealed');
      });
    }, { threshold: 0.1 });
    $$('.timeline-item').forEach(el => observer.observe(el));
  }, 50);
}

/* ==========================================================
   RENDER GALLERY
   ============================================================ */
let currentGalleryFilter = 'all';

function renderGallery(filter) {
  currentGalleryFilter = filter || currentGalleryFilter;
  const gallery = $('#gallery');
  const empty = $('#galleryEmpty');

  let memories = [...appData.memories].sort((a, b) => {
    return new Date(b.date) - new Date(a.date);
  });

  if (currentGalleryFilter !== 'all') {
    memories = memories.filter(m => m.mood === currentGalleryFilter);
  }

  if (memories.length === 0) {
    gallery.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  gallery.innerHTML = memories.map((m, i) => `
    <div class="gallery-card" data-id="${m.id}" style="transition-delay:${i * 0.04}s">
      <div class="gallery-image">
        ${m.imageUrl
          ? `<img src="${escapeHtml(m.imageUrl)}" alt="" loading="lazy" onerror="this.innerHTML='<span style=font-size:3rem>🖼️</span>'">`
          : `<span>${m.imageEmoji || m.mood || '💕'}</span>`}
      </div>
      <div class="gallery-info">
        <div class="gallery-date">${formatDate(m.date)}</div>
        <div class="gallery-title">${escapeHtml(m.title)}</div>
      </div>
    </div>
  `).join('');

  gallery.querySelectorAll('.gallery-card').forEach(card => {
    card.addEventListener('click', () => openDetailModal(card.dataset.id));
  });

  // Re-observe
  setTimeout(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('revealed');
      });
    }, { threshold: 0.1 });
    $$('.gallery-card').forEach(el => observer.observe(el));
  }, 50);
}

/* ==========================================================
   MODALS
   ============================================================ */
// Generic modal helpers
function openModal(overlayId) {
  $(overlayId).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(overlayId) {
  $(overlayId).classList.remove('open');
  document.body.style.overflow = '';
}

// Image upload handling
let pendingImageBase64 = '';

function resetImageUpload() {
  pendingImageBase64 = '';
  $('#uploadPreview').style.display = 'none';
  $('#uploadPlaceholder').style.display = '';
  $('#inputImageFile').value = '';
  $('#inputImageUrl').value = '';
}

function handleImageFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    showToast('请选择图片文件');
    return;
  }
  // Compress large images (> 2MB) before storing
  if (file.size > 2 * 1024 * 1024) {
    compressImage(file, (dataUrl) => {
      pendingImageBase64 = dataUrl;
      showPreview(dataUrl);
    });
  } else {
    const reader = new FileReader();
    reader.onload = function(e) {
      pendingImageBase64 = e.target.result;
      showPreview(e.target.result);
    };
    reader.readAsDataURL(file);
  }
}

function compressImage(file, callback) {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = function() {
    URL.revokeObjectURL(url);
    const canvas = document.createElement('canvas');
    const maxW = 1200;
    const maxH = 1200;
    let w = img.width;
    let h = img.height;
    if (w > maxW || h > maxH) {
      const ratio = Math.min(maxW / w, maxH / h);
      w = Math.round(w * ratio);
      h = Math.round(h * ratio);
    }
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.85));
  };
  img.src = url;
}

function showPreview(dataUrl) {
  $('#uploadPreviewImg').src = dataUrl;
  $('#uploadPreview').style.display = 'block';
  $('#uploadPlaceholder').style.display = 'none';
}

// Upload area events
$('#imageUploadArea').addEventListener('click', function(e) {
  if (e.target.closest('#clearImageBtn')) return;
  $('#inputImageFile').click();
});
$('#imageUploadArea').addEventListener('dragover', function(e) {
  e.preventDefault();
  this.classList.add('drag-over');
});
$('#imageUploadArea').addEventListener('dragleave', function() {
  this.classList.remove('drag-over');
});
$('#imageUploadArea').addEventListener('drop', function(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleImageFile(file);
});
$('#inputImageFile').addEventListener('change', function() {
  if (this.files[0]) handleImageFile(this.files[0]);
});
$('#clearImageBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  resetImageUpload();
});

// Clear uploaded image when user types a URL
$('#inputImageUrl').addEventListener('input', function() {
  if (this.value.trim() && pendingImageBase64) {
    resetImageUpload();
  }
});

// ADD modal
$('#fabAdd').addEventListener('click', () => {
  $('#editId').value = '';
  $('#memoryForm').reset();
  resetImageUpload();
  $('#modalTitle').textContent = '记录美好瞬间';
  $('#inputDate').value = new Date().toISOString().slice(0, 10);
  $('#inputMilestone').checked = false;
  // Reset mood picker
  $$('#moodPicker .mood-option').forEach(b => b.classList.remove('selected'));
  $('#moodPicker .mood-option[data-mood="😍"]').classList.add('selected');
  openModal('#memoryModalOverlay');
});

$('#btnModalClose').addEventListener('click', () => closeModal('#memoryModalOverlay'));
$('#btnModalCancel').addEventListener('click', () => closeModal('#memoryModalOverlay'));
$('#memoryModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal('#memoryModalOverlay');
});

// Mood picker
$('#moodPicker').addEventListener('click', function(e) {
  const btn = e.target.closest('.mood-option');
  if (!btn) return;
  e.preventDefault();
  this.querySelectorAll('.mood-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
});

// Memory form submit
$('#memoryForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const id = $('#editId').value;
  const selectedMood = $('#moodPicker .mood-option.selected');
  const memory = {
    id: id || generateId(),
    date: $('#inputDate').value,
    title: $('#inputTitle').value.trim(),
    content: $('#inputContent').value.trim(),
    mood: selectedMood ? selectedMood.dataset.mood : '😍',
    category: $('#inputCategory').value,
    imageEmoji: $('#inputImageEmoji').value.trim(),
    imageUrl: pendingImageBase64 || $('#inputImageUrl').value.trim(),
    isMilestone: $('#inputMilestone').checked,
    createdAt: id ? (appData.memories.find(m => m.id === id)?.createdAt || Date.now()) : Date.now()
  };

  if (!memory.date || !memory.title) {
    showToast('请至少填写日期和标题');
    return;
  }

  if (id) {
    // Edit existing
    const idx = appData.memories.findIndex(m => m.id === id);
    if (idx !== -1) appData.memories[idx] = memory;
    showToast('记忆已更新 ✨');
  } else {
    // Add new
    appData.memories.push(memory);
    showToast('美好瞬间已记录 💕');
  }

  saveData(appData);
  closeModal('#memoryModalOverlay');
  renderAll();
});

// DETAIL modal
function openDetailModal(id) {
  const m = appData.memories.find(mem => mem.id === id);
  if (!m) return;

  const content = $('#detailContent');
  content.innerHTML = `
    ${(m.imageUrl || m.imageEmoji) ? `
      <div class="detail-image">
        ${m.imageUrl ? `<img src="${escapeHtml(m.imageUrl)}" alt="" onerror="this.parentElement.innerHTML='<span style=font-size:5rem>🖼️</span>'">` : `<span>${m.imageEmoji}</span>`}
      </div>` : ''}
    <div class="detail-meta">
      <span class="detail-mood">${m.mood || '💕'}</span>
      <span class="detail-date">${formatDate(m.date)}</span>
      ${m.isMilestone ? '<span style="background:var(--gold-light);color:var(--gold);padding:2px 12px;border-radius:100px;font-size:0.75rem;">⭐ 里程碑</span>' : ''}
    </div>
    <h3 style="margin-bottom:0.8rem;font-weight:500">${escapeHtml(m.title)}</h3>
    ${m.content ? `<div class="detail-content">${escapeHtml(m.content)}</div>` : ''}
  `;
  openModal('#detailModalOverlay');
}

$('#btnDetailClose').addEventListener('click', () => closeModal('#detailModalOverlay'));
$('#detailModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal('#detailModalOverlay');
});

// EDIT
function openEditModal(id) {
  const m = appData.memories.find(mem => mem.id === id);
  if (!m) return;

  $('#editId').value = m.id;
  $('#modalTitle').textContent = '编辑记忆';
  $('#inputDate').value = m.date;
  $('#inputTitle').value = m.title;
  $('#inputContent').value = m.content || '';
  $('#inputCategory').value = m.category || 'daily';
  $('#inputImageEmoji').value = m.imageEmoji || '';
  $('#inputImageUrl').value = m.imageUrl && !m.imageUrl.startsWith('data:') ? m.imageUrl : '';
  $('#inputMilestone').checked = !!m.isMilestone;

  // Handle existing image
  resetImageUpload();
  if (m.imageUrl) {
    pendingImageBase64 = m.imageUrl.startsWith('data:') ? m.imageUrl : '';
    if (m.imageUrl.startsWith('data:')) {
      showPreview(m.imageUrl);
    }
  }

  // Set mood
  $$('#moodPicker .mood-option').forEach(b => {
    b.classList.toggle('selected', b.dataset.mood === m.mood);
  });

  openModal('#memoryModalOverlay');
}

// DELETE
function deleteMemory(id) {
  if (!confirm('确定要删除这条记忆吗？此操作不可撤销。')) return;
  appData.memories = appData.memories.filter(m => m.id !== id);
  saveData(appData);
  renderAll();
  showToast('记忆已删除');
}

/* ==========================================================
   SETUP MODAL
   ============================================================ */
$('#setupForm').addEventListener('submit', function(e) {
  e.preventDefault();
  appData.partner1 = $('#setupPartner1').value.trim();
  appData.partner2 = $('#setupPartner2').value.trim();
  appData.startDate = $('#setupStartDate').value;
  saveData(appData);
  $('#setupOverlay').classList.add('hidden');
  updateDaysCounter();
  showToast('欢迎来到你们的小世界 💝');
});

/* ==========================================================
   SETTINGS MODAL
   ============================================================ */
$('#btnSettings').addEventListener('click', () => {
  $('#settingsPartner1').value = appData.partner1 || '';
  $('#settingsPartner2').value = appData.partner2 || '';
  $('#settingsStartDate').value = appData.startDate || '';
  openModal('#settingsModalOverlay');
});
$('#btnSettingsClose').addEventListener('click', () => closeModal('#settingsModalOverlay'));
$('#btnSettingsCancel').addEventListener('click', () => closeModal('#settingsModalOverlay'));
$('#settingsModalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal('#settingsModalOverlay');
});
$('#settingsForm').addEventListener('submit', function(e) {

  appData.partner1 = $('#settingsPartner1').value.trim();
  appData.partner2 = $('#settingsPartner2').value.trim();
  appData.startDate = $('#settingsStartDate').value;

/* ==========================================================
   FILTERS
   ============================================================ */
$('#filterBar').addEventListener('click', function(e) {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  this.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderTimeline(chip.dataset.filter);
});

$('#galleryFilterBar').addEventListener('click', function(e) {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  this.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderGallery(chip.dataset.mood);
});

/* ==========================================================
   EXPORT / IMPORT
   ============================================================ */
$('#btnExport').addEventListener('click', () => {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'our-story-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出 📥');
});

$('#btnImport').addEventListener('click', () => {
  $('#importFileInput').click();
});

$('#importFileInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.memories || !Array.isArray(data.memories)) {
        throw new Error('Invalid format');
      }
      if (!confirm(`即将导入 ${data.memories.length} 条记忆，当前数据将被覆盖。确定继续？`)) return;
      appData = data;
      if (!appData.memories) appData.memories = [];
      saveData(appData);
      updateDaysCounter();
      renderAll();
      showToast(`成功导入 ${data.memories.length} 条记忆 ✨`);
    } catch(err) {
      showToast('文件格式不正确，请检查后重试');
    }
  };
  reader.readAsText(file);
  this.value = ''; // Reset so same file can be imported again
});

/* ==========================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal('#memoryModalOverlay');
    closeModal('#detailModalOverlay');
    closeModal('#settingsModalOverlay');
  }
  // Ctrl+N or Cmd+N for new memory
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    $('#fabAdd').click();
  }
});

/* ==========================================================
   RENDER ALL
   ============================================================ */
function renderAll() {
  renderTimeline();
  renderGallery();
}

/* ==========================================================
   INIT
   ============================================================ */
function init() {
  initPetals();
  initScroll();
  initRevealObserver();
  updateDaysCounter();

  if (isFirstTime()) {
    $('#setupOverlay').classList.remove('hidden');
    // Set default date to one year ago
    const oneYearAgo = new Date();
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    $('#setupStartDate').value = oneYearAgo.toISOString().slice(0, 10);
  }

  renderAll();

  // Update days counter every minute (for midnight rollover)
  setInterval(updateDaysCounter, 60000);
}

init();

})();
</script>
